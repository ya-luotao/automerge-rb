name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: gem build automerge-rb.gemspec
      - uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: ./automerge-rb-*.gem
          if-no-files-found: error

  cross:
    name: Build native gem (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arm64-darwin
          - x86_64-darwin
          - x86_64-linux
          - aarch64-linux
          - x64-mingw-ucrt
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true
      # Pinned past v7 because v7 hardcodes the artifact name to "cross-gem",
      # which collides across the matrix; af82482 adds the artifact-name input.
      - uses: oxidize-rb/cross-gem-action@af8248258c88dd65cf31c9e9205e9c0d373db186
        with:
          platform: ${{ matrix.platform }}
          artifact-name: gem-${{ matrix.platform }}
          ruby-versions: "3.0,3.1,3.2,3.3,3.4"
          version: "0.9.34"
          setup: |
            set -e
            rustup toolchain install 1.89.0 --profile minimal --component rustc --component cargo
            rustup default 1.89.0
            if [ -n "$CARGO_BUILD_TARGET" ]; then
              rustup target add "$CARGO_BUILD_TARGET"
            fi
            bundle install

  publish:
    name: Publish to RubyGems
    needs: [source, cross]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          merge-multiple: true
          path: pkg
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Push gems
        run: |
          set -e
          for gem in pkg/*.gem; do
            gem push "$gem"
          done
