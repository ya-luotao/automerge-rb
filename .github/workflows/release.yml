name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: gem build automerge-rb.gemspec
      - uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: ./automerge-rb-*.gem
          if-no-files-found: error

  cross:
    name: Build native gem (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arm64-darwin
          - x86_64-darwin
          - x86_64-linux
          - aarch64-linux
          - x64-mingw-ucrt
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true
      # rb-sys-dock bind-mounts ~/.cargo/registry and ~/.cargo/git into the
      # container; setup-ruby-and-rust only creates them on cache hit.
      - name: Ensure cargo cache directories exist
        run: mkdir -p ~/.cargo/registry ~/.cargo/git
      # cross-gem-action is archived and its bundled @actions/artifact@1.x is
      # rejected by GitHub Actions ("Create Artifact Container failed").
      # oxidize-rb/actions/cross-gem is the supported successor; pinned past
      # v1.4.4 because that tag references inputs.pre-script but never declared
      # it as an input or wired it through to rb-sys-dock (dc5cfb9 did both).
      - uses: oxidize-rb/actions/cross-gem@dc5cfb92469a14f8ced15a13f1c5529ad7701010
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.0,3.1,3.2,3.3,3.4"
          tag: "0.9.34"
          # Single-line: rb-sys-dock forwards pre-script to `bash -c`, which
          # loses control-flow context across multi-line YAML block scalars.
          pre-script: 'set -e && rustup toolchain install 1.89.0 --profile minimal --component rustc --component cargo && rustup default 1.89.0 && { [ -z "$CARGO_BUILD_TARGET" ] || rustup target add "$CARGO_BUILD_TARGET"; } && bundle install'
      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}
          if-no-files-found: error

  publish:
    name: Publish to RubyGems
    needs: [source, cross]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          merge-multiple: true
          path: pkg
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Push gems
        run: |
          set -e
          for gem in pkg/*.gem; do
            gem push "$gem"
          done
