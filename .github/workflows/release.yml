name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: gem build automerge.gemspec
      - uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: ./automerge-*.gem
          if-no-files-found: error

  cross:
    name: Build native gem (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arm64-darwin
          - x86_64-darwin
          - x86_64-linux
          - aarch64-linux
          - x64-mingw-ucrt
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true
      - uses: oxidize-rb/cross-gem-action@v9
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.0,3.1,3.2,3.3,3.4"
      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/automerge-*-${{ matrix.platform }}.gem
          if-no-files-found: error

  publish:
    name: Publish to RubyGems
    needs: [source, cross]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: rubygems
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          merge-multiple: true
          path: pkg
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Push gems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          set -e
          for gem in pkg/*.gem; do
            gem push "$gem"
          done
